<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Drop C++</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: #111;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas.emscripten {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
  </head>
  <body>
    <div id="click-overlay" style="
        position:fixed; top:0; left:0; width:100%; height:100%;
        background:rgba(0,0,0,0.75);
        display:flex; flex-direction:column;
        justify-content:center; align-items:center;
        cursor:pointer; z-index:10; color:white; font-family:sans-serif;">
        <div style="font-size:32px; font-weight:bold; letter-spacing:4px;">クリックしてスタート</div>
    </div>
    <canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas>
    <script>
        var GAME_W = 560;
        var GAME_H = 704;

        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (!canvas || canvas.width === 0) return;
            var scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
            canvas.style.width  = (GAME_W * scale) + 'px';
            canvas.style.height = (GAME_H * scale) + 'px';
        }

        window.addEventListener('resize', resizeCanvas);

        setInterval(resizeCanvas, 200);

        document.getElementById('click-overlay').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('canvas').focus();
            resizeCanvas();
        });

        var Module = {
            canvas: (function() {
                return document.getElementById('canvas');
            })()
        };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
